---
# Requires .hadolint.yaml at the repo root.
name: Docker Quality

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKERFILE_PATH: "Dockerfile"

jobs:
  lint:
    name: Lint Docker Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Ignore rules live in .hadolint.yaml - do not duplicate here.
      - name: Hadolint
        if: ${{ hashFiles(env.DOCKERFILE_PATH) != '' }}
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ env.DOCKERFILE_PATH }}

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
                level: warning
              comments:
                min-spaces-from-content: 1
              truthy:
                allowed-values: ['true', 'false', 'on', 'off', 'yes', 'no']
              document-start:
                present: true

      - name: Set up Docker Compose
        if: >-
          ${{
            hashFiles(
              'docker-compose.yml',
              'docker-compose.yaml',
              'compose.yml',
              'compose.yaml'
            ) != ''
          }}
        uses: docker/setup-compose-action@v2

      - name: Docker Compose Validation
        if: >-
          ${{
            hashFiles(
              'docker-compose.yml',
              'docker-compose.yaml',
              'compose.yml',
              'compose.yaml'
            ) != ''
          }}
        run: |
          if [ ! -f ".env" ]; then
            touch .env
          fi
          if ! OUTPUT=$(docker compose config --quiet 2>&1); then
            # Missing env vars: warn. Syntax errors: fail.
            if echo "$OUTPUT" | grep -qi "variable is not set"; then
              echo "::warning::Compose env vars required: $OUTPUT"
            else
              echo "::error::Docker Compose validation failed: $OUTPUT"
              exit 1
            fi
          fi
