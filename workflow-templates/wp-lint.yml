---
name: Lint

"on":
  push:
    branches: [main]
    paths:
      - '**/*.php'
      - '.github/workflows/wp-lint.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml'
      - 'phpcs.xml.dist'
      - 'phpstan.neon'
      - 'phpstan-bootstrap.php'
      - 'languages/**'
  pull_request:
    paths:
      - '**/*.php'
      - '.github/workflows/wp-lint.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml'
      - 'phpcs.xml.dist'
      - 'phpstan.neon'
      - 'phpstan-bootstrap.php'
      - 'languages/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: oszuidwest/.github-templates/.github/workflows/wp-ci.yml@v2
    with:
      composer-audit: true
      exact-pot-validation: true
      strict-composer-validation: true
