---
# Trust-main release: builds the tagged commit and ships it. Gate on extra
# checks (integration tests, etc.) by composing via `needs:` from the caller.
name: Go Release

on:
  workflow_call:
    inputs:
      project-name:
        description: >-
          Project name. Used as edge artifact prefix and binary basename.
        type: string
        required: true
      ldflags-target:
        description: >-
          Go package path where PascalCase Version/Commit/BuildTime are injected
          (e.g. "main" or "github.com/org/repo/pkg/version"). Symbols MUST be
          PascalCase: Version, Commit, BuildTime.
        type: string
        required: true
      build-matrix:
        description: >-
          JSON array of build targets, e.g.
          [{"os":"linux","arch":"amd64"},{"os":"linux","arch":"arm"}].
        type: string
        required: true
      main-package:
        description: 'Go main package path passed to `go build` (default: ".").'
        type: string
        default: '.'
      version:
        description: >-
          Release version when triggered via a consumer workflow_dispatch.
          Accepts "edge", "vX.Y.Z", or "X.Y.Z". Leave empty for tag pushes.
        type: string
        default: ''
      allow-tag-rebuild:
        description: >-
          Allow workflow_dispatch to rebuild a pre-existing tag when that tag
          points at a different commit than the workflow dispatch ref. Keep
          false so caller `needs:` gates cover the commit that is released.
        type: boolean
        default: false
      release-body:
        description: >-
          Optional release-notes prefix prepended to auto-generated notes.
          Supports markdown. Use for Docker pull commands, install instructions,
          etc. When empty, only auto-generated notes are used.
        type: string
        default: ''
    outputs:
      version:
        description: >-
          Resolved release version. Tagged releases yield `vX.Y.Z`; edge runs
          yield `edge-<short-sha>`. Forward to docker-publish.yml or other
          downstream jobs.
        value: ${{ jobs.release.outputs.version }}
      is_release:
        description: >-
          `true` for tagged releases (including prereleases), `false` for edge
          runs. Gate downstream Docker publish jobs on this so edge builds
          stay artifacts-only.
        value: ${{ jobs.release.outputs.is_release }}
      commit:
        description: >-
          Resolved build commit SHA. For manual rebuilds with allow-tag-rebuild
          set, this can differ from `github.sha`.
        value: ${{ jobs.release.outputs.commit }}

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      commit: ${{ steps.target.outputs.commit }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_VERSION" ]; then
              echo "::error::version input is required for manual calls."
              exit 1
            fi
            if [ "$INPUT_VERSION" = "edge" ]; then
              SHORT_SHA=$(git rev-parse --short HEAD)
              echo "version=edge-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
              echo "is_release=false" >> "$GITHUB_OUTPUT"
            else
              # Auto-prefix v for "1.2.3" → "v1.2.3".
              case "$INPUT_VERSION" in
                v*) VERSION="$INPUT_VERSION" ;;
                *)  VERSION="v$INPUT_VERSION" ;;
              esac
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "is_release=true" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$EVENT_NAME" = "push" ]; then
            case "$GITHUB_REF" in
              refs/tags/*)
                echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                echo "is_release=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::Push on $GITHUB_REF is not a tag ref."
                echo "::error::This workflow releases tag pushes only."
                exit 1
                ;;
            esac
          else
            echo "::error::Unsupported event '$EVENT_NAME'."
            echo "::error::Supported triggers: tag push, workflow_dispatch."
            exit 1
          fi

      - name: Create or check out version tag (manual release)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          steps.version.outputs.is_release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ALLOW_TAG_REBUILD: ${{ inputs.allow-tag-rebuild }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            TAG_SHA=$(git rev-list -n 1 "refs/tags/$VERSION")
            if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              if [ "$ALLOW_TAG_REBUILD" != "true" ]; then
                echo "::error::Tag $VERSION points to $TAG_SHA."
                echo "::error::This workflow was dispatched at $GITHUB_SHA."
                echo "::error::Caller gates run against the dispatch commit."
                echo "::error::Set allow-tag-rebuild: true to rebuild it."
                exit 1
              fi
            fi
            echo "Tag $VERSION already exists; checking out that tag."
          else
            git tag "$VERSION"
            git push origin "refs/tags/$VERSION"
          fi
          # End on the tag commit so COMMIT and downstream Docker build match.
          git checkout "refs/tags/$VERSION"

      - name: Resolve build commit
        id: target
        # HEAD, not github.sha: the previous step may have checked out the tag.
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PROJECT: ${{ inputs.project-name }}
          LDFLAGS_TARGET: ${{ inputs.ldflags-target }}
          BUILD_MATRIX: ${{ inputs.build-matrix }}
          MAIN_PACKAGE: ${{ inputs.main-package }}
          COMMIT: ${{ steps.target.outputs.commit }}
        run: |
          mkdir -p dist
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "$BUILD_MATRIX" | jq -c '.[]' | while read -r entry; do
            GOOS=$(echo "$entry" | jq -r '.os')
            GOARCH=$(echo "$entry" | jq -r '.arch')
            GOARM=$(echo "$entry" | jq -r '.arm // empty')

            output_name="${PROJECT}-${VERSION}-${GOOS}-${GOARCH}"
            [ -n "$GOARM" ] && output_name="${output_name}v${GOARM}"
            [ "$GOOS" = "windows" ] && output_name="${output_name}.exe"

            echo "Building $output_name"

            LDFLAGS="-s -w"
            LDFLAGS="$LDFLAGS -X ${LDFLAGS_TARGET}.Version=${VERSION}"
            LDFLAGS="$LDFLAGS -X ${LDFLAGS_TARGET}.Commit=${COMMIT}"
            LDFLAGS="$LDFLAGS -X ${LDFLAGS_TARGET}.BuildTime=${BUILD_TIME}"

            env GOOS="$GOOS" GOARCH="$GOARCH" GOARM="$GOARM" CGO_ENABLED=0 \
              go build \
              -ldflags="$LDFLAGS" \
              -o "dist/${output_name}" \
              "${MAIN_PACKAGE}"
          done

      - name: Create GitHub Release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: dist/*
          body: ${{ inputs.release-body }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload edge artifacts
        if: steps.version.outputs.is_release == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.project-name }}-edge-${{ github.sha }}
          path: dist/*
          retention-days: 7
