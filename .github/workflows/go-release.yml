---
# Reusable Go release workflow
# Source: oszuidwest/.github-templates
#
# Trust-main release model: this workflow builds binaries from the tagged
# commit and ships them. Verification (tests, lint, fmt) is the job of PR CI
# on the way into main, not the release path. To gate a release on a custom
# check (integration tests, smoke tests, etc.), compose via `needs:` from the
# caller — see the README for the pattern.
#
# - Tag push or workflow_call with `version: edge` or `vX.Y.Z` (or `X.Y.Z`).
# - Tag re-run guard so workflow_dispatch can be re-run on existing tags.
#   When a tag already exists, that tag is checked out so the build matches
#   the tag.
# - Build matrix from JSON input.
# - Ldflags inject PascalCase Version/Commit/BuildTime.
# - GitHub Release with prerelease auto-detect via contains(version, '-').
# - Edge artifact: <project>-edge-<sha>, no Docker push for edge.
#
# v2 dropped the nested docker job. To publish a Docker image alongside a
# release, the caller adds a second job that calls docker-publish.yml@v1
# directly, gated on `needs.release.outputs.is_release == 'true'`. See the
# README for the composition pattern.

name: Go Release

on:
  workflow_call:
    inputs:
      project-name:
        description: >-
          Project name. Used as edge artifact prefix and binary basename.
        type: string
        required: true
      ldflags-target:
        description: >-
          Go package path where PascalCase Version/Commit/BuildTime are injected
          (e.g. "main" or "github.com/org/repo/pkg/version"). Symbols MUST be
          PascalCase: Version, Commit, BuildTime.
        type: string
        required: true
      build-matrix:
        description: >-
          JSON array of build targets, e.g.
          [{"os":"linux","arch":"amd64"},{"os":"linux","arch":"arm"}].
        type: string
        required: true
      main-package:
        description: 'Go main package path passed to `go build` (default: ".").'
        type: string
        default: '.'
      version:
        description: >-
          Release version when triggered via a consumer workflow_dispatch.
          Accepts "edge", "vX.Y.Z", or "X.Y.Z". Leave empty for tag pushes.
        type: string
        default: ''
      release-body:
        description: >-
          Optional release-notes prefix prepended to auto-generated notes.
          Supports markdown. Use for Docker pull commands, install instructions,
          etc. When empty, only auto-generated notes are used.
        type: string
        default: ''
    outputs:
      version:
        description: >-
          Resolved release version. Tagged releases yield `vX.Y.Z`; edge runs
          yield `edge-<short-sha>`. Forward to docker-publish.yml or other
          downstream jobs.
        value: ${{ jobs.release.outputs.version }}
      is_release:
        description: >-
          `true` for tagged releases (including prereleases), `false` for edge
          runs. Gate downstream Docker publish jobs on this so edge builds
          stay artifacts-only.
        value: ${{ jobs.release.outputs.is_release }}

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_VERSION" ]; then
              echo "::error::version input is required for manual calls."
              exit 1
            fi
            if [ "$INPUT_VERSION" = "edge" ]; then
              SHORT_SHA=$(git rev-parse --short HEAD)
              echo "version=edge-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
              echo "is_release=false" >> "$GITHUB_OUTPUT"
            else
              # Auto-prefix v if user typed "1.2.3" instead of "v1.2.3"
              case "$INPUT_VERSION" in
                v*) VERSION="$INPUT_VERSION" ;;
                *)  VERSION="v$INPUT_VERSION" ;;
              esac
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "is_release=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download dependencies
        run: go mod download

      - name: Create or check out version tag (manual release)
        if: >-
          github.event_name != 'push' &&
          steps.version.outputs.is_release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists; checking out that tag."
          else
            git tag "$VERSION"
            git push origin "refs/tags/$VERSION"
          fi
          # Always end on the tag commit so the embedded COMMIT ldflag matches
          # the tag, and any downstream docker-publish job builds from the same
          # source as the version label.
          git checkout "refs/tags/$VERSION"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PROJECT: ${{ inputs.project-name }}
          LDFLAGS_TARGET: ${{ inputs.ldflags-target }}
          BUILD_MATRIX: ${{ inputs.build-matrix }}
          MAIN_PACKAGE: ${{ inputs.main-package }}
        run: |
          mkdir -p dist
          # Resolve COMMIT from HEAD, not github.sha. After a manual re-run on
          # an existing tag the previous step checks out the tag commit; the
          # workflow-level github.sha still points at the dispatch-commit and
          # would yield a binary whose embedded commit doesn't match the tag.
          COMMIT=$(git rev-parse HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "$BUILD_MATRIX" | jq -c '.[]' | while read -r entry; do
            GOOS=$(echo "$entry" | jq -r '.os')
            GOARCH=$(echo "$entry" | jq -r '.arch')
            GOARM=$(echo "$entry" | jq -r '.arm // empty')

            output_name="${PROJECT}-${VERSION}-${GOOS}-${GOARCH}"
            [ -n "$GOARM" ] && output_name="${output_name}v${GOARM}"
            [ "$GOOS" = "windows" ] && output_name="${output_name}.exe"

            echo "Building $output_name"

            LDFLAGS="-s -w"
            LDFLAGS="$LDFLAGS -X ${LDFLAGS_TARGET}.Version=${VERSION}"
            LDFLAGS="$LDFLAGS -X ${LDFLAGS_TARGET}.Commit=${COMMIT}"
            LDFLAGS="$LDFLAGS -X ${LDFLAGS_TARGET}.BuildTime=${BUILD_TIME}"

            env GOOS="$GOOS" GOARCH="$GOARCH" GOARM="$GOARM" CGO_ENABLED=0 \
              go build \
              -ldflags="$LDFLAGS" \
              -o "dist/${output_name}" \
              "${MAIN_PACKAGE}"
          done

      - name: Create GitHub Release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: dist/*
          # When body is non-empty, softprops/action-gh-release prepends it to
          # the auto-generated notes. Empty body falls through to auto-only.
          body: ${{ inputs.release-body }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload edge artifacts
        if: steps.version.outputs.is_release == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.project-name }}-edge-${{ github.sha }}
          path: dist/*
          retention-days: 7
