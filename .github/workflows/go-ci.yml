---
name: Go CI

on:
  workflow_call:
    inputs:
      golangci-lint-version:
        description: 'golangci-lint version (pinned, no v-prefix stripping)'
        type: string
        default: 'v2.12.1'
      go-version-file:
        description: 'Path to file used by setup-go to derive Go version'
        type: string
        default: 'go.mod'
      enable-frontend:
        description: 'Run a frontend lint job (Bun) alongside the Go job'
        type: boolean
        default: false
      frontend-tool:
        description: >-
          Frontend tool to use when enable-frontend is true.
          Only "bun" is supported in v1.
        type: string
        default: 'bun'
      deadcode-version:
        description: 'golang.org/x/tools/cmd/deadcode version'
        type: string
        default: 'v0.45.0'
      govulncheck-version:
        description: 'golang.org/x/vuln/cmd/govulncheck version'
        type: string
        default: 'v1.3.0'
      staticcheck-version:
        description: 'honnef.co/go/tools/cmd/staticcheck version'
        type: string
        default: '2026.1'

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -shuffle=on -v ./...

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci-lint-version }}
          args: --timeout=5m

      # Installed centrally so consumers don't need tool directives in go.mod.
      - name: Install Go analysis tools
        env:
          DEADCODE_VERSION: ${{ inputs.deadcode-version }}
          GOVULNCHECK_VERSION: ${{ inputs.govulncheck-version }}
          STATICCHECK_VERSION: ${{ inputs.staticcheck-version }}
        run: |
          go install "golang.org/x/tools/cmd/deadcode@${DEADCODE_VERSION}"
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"

      - name: Check for dead code
        run: |
          deadcode_output=$(deadcode ./...)
          if [ -n "$deadcode_output" ]; then
            echo "$deadcode_output"
            exit 1
          fi

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run staticcheck
        run: staticcheck ./...

  frontend:
    name: Frontend
    if: inputs.enable-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify frontend tool
        if: inputs.frontend-tool != 'bun'
        run: |
          echo "::error::Only frontend-tool 'bun' is supported in v1."
          exit 1

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
