---
name: Go CI

"on":
  workflow_call:
    inputs:
      golangci-lint-version:
        description: 'golangci-lint version (pinned, no v-prefix stripping)'
        type: string
        default: 'v2.12.1'
      go-version-file:
        description: 'Path to file used by setup-go to derive Go version'
        type: string
        default: 'go.mod'
      enable-frontend:
        description: 'Run a frontend lint job (Bun) alongside the Go job'
        type: boolean
        default: false
      frontend-tool:
        description: >-
          Frontend tool to use when enable-frontend is true.
          Only "bun" is supported in v1.
        type: string
        default: 'bun'
      deadcode-version:
        description: >-
          Override deadcode version. Empty = use version pinned in
          oszuidwest/.github-templates tools/go.mod (Dependabot-managed).
        type: string
        default: ''
      govulncheck-version:
        description: >-
          Override govulncheck version. Empty = use version pinned in
          oszuidwest/.github-templates tools/go.mod (Dependabot-managed).
        type: string
        default: ''
      staticcheck-version:
        description: >-
          Override staticcheck version. Empty = use version pinned in
          oszuidwest/.github-templates tools/go.mod (Dependabot-managed).
        type: string
        default: ''

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # tools/go.mod is the Dependabot-managed source of truth for
      # analysis tool versions. Sparse-checkout keeps this cheap.
      - name: Checkout central tool pins
        uses: actions/checkout@v7
        with:
          repository: oszuidwest/.github-templates
          ref: v2
          path: .tool-pins
          sparse-checkout: tools
          sparse-checkout-cone-mode: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -shuffle=on -v ./...

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci-lint-version }}
          args: --timeout=5m

      - name: Resolve analysis tool versions
        id: tool_versions
        working-directory: .tool-pins/tools
        env:
          GOTOOLCHAIN: auto
          DEADCODE_OVERRIDE: ${{ inputs.deadcode-version }}
          GOVULNCHECK_OVERRIDE: ${{ inputs.govulncheck-version }}
          STATICCHECK_OVERRIDE: ${{ inputs.staticcheck-version }}
        run: |
          mod_v() {
            go list -m -f '{{.Version}}' "$1"
          }

          deadcode_v="${DEADCODE_OVERRIDE:-$(mod_v golang.org/x/tools)}"
          govulncheck_v="${GOVULNCHECK_OVERRIDE:-$(mod_v golang.org/x/vuln)}"
          staticcheck_v="${STATICCHECK_OVERRIDE:-$(mod_v honnef.co/go/tools)}"
          {
            echo "deadcode=$deadcode_v"
            echo "govulncheck=$govulncheck_v"
            echo "staticcheck=$staticcheck_v"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved:"
          echo "  deadcode=$deadcode_v"
          echo "  govulncheck=$govulncheck_v"
          echo "  staticcheck=$staticcheck_v"

      - name: Install Go analysis tools
        env:
          DEADCODE_VERSION: ${{ steps.tool_versions.outputs.deadcode }}
          GOVULNCHECK_VERSION: ${{ steps.tool_versions.outputs.govulncheck }}
          STATICCHECK_VERSION: ${{ steps.tool_versions.outputs.staticcheck }}
        run: |
          go install "golang.org/x/tools/cmd/deadcode@${DEADCODE_VERSION}"
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"

      - name: Check for dead code
        run: |
          deadcode_output=$(deadcode ./...)
          if [ -n "$deadcode_output" ]; then
            echo "$deadcode_output"
            exit 1
          fi

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run staticcheck
        run: staticcheck ./...

  frontend:
    name: Frontend
    if: inputs.enable-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify frontend tool
        if: inputs.frontend-tool != 'bun'
        run: |
          echo "::error::Only frontend-tool 'bun' is supported in v1."
          exit 1

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
